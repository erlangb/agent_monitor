version: "2"

linters:
  default: none
  enable:
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - unused
  settings:
    errcheck:
      # fmt.Fprint* writes to stdout/stderr in a CLI — errors are not actionable.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf
